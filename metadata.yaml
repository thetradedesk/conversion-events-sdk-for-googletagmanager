  - sha: 980a35685ebc4c3a782697f1553537722a16ac58
    changeNotes: >
      ## 2.5.0


      ### Minor Changes


      -   85334d9: Fix CI ordering so the `gtm_template_version` constant baked
      into `template.tpl` matches the version in the metadata.yaml entry
      committed alongside it. Previously the `build` stage ran `pnpm
      build:template-tpl` against the _pre-bump_ `package.json`, then the
      `release-public` stage ran `pnpm changeset version` to bump
      `package.json`, then committed the (stale) `dist/template.tpl` to the
      public branch. The result was that every release shipped a template
      containing the _previous_ release's version — e.g. the `2.4.0` release's
      template had `gtm_template_version = '2.3.0'`. The release on `public` now
      rebuilds the template after the changeset version bump so the two versions
      agree.

          Conversion events from production tag instances will start reporting the correct, current `eventDataSourceVersion` once this release lands. Historical releases have an off-by-one version label baked into their template; that cannot be backfilled but is harmless — it was already the case before any version was reported at all.
  - sha: e64a3dbc92ccd87fd49734a6a90eb8f910464075
    changeNotes: >
      ## 2.4.0


      ### Minor Changes


      -   d8e405e: Tag template now reports its own version as
      `eventDataSourceVersion` on the SDK init call. This lets Beacon attribute
      conversion events to the specific GTM template version that fired them,
      which is useful for diagnosing client-side issues that correlate to
      template upgrades.

          The value is injected at build time from `package.json` (via a `__GTM_TEMPLATE_VERSION__` placeholder in the sandboxed JS, substituted by `build_template_tpl.js`), so no manual upkeep is required — the existing changeset-driven version bump on every merge flows through automatically.

          Note: this depends on a corresponding change to the JS SDK (`up_loader.3.0.0.js`) that adds `eventDataSourceVersion` to its accepted `init()` parameters. Until that ships, the field is silently ignored by the SDK and behavior is unchanged.
  - sha: 3bb2af5e1aed945f4a5c752cc1ac4f6951f13029
    changeNotes: >
      ## 2.3.0


      ### Minor Changes


      -   cd9d865: Hardcode the TTD Conversion JavaScript SDK URL in the
      template, instead of exposing it as a user-editable field

          Previously, `SDK Advanced Technical Settings > TTD Conversion Javascript SDK URL` was a user-editable text field that defaulted to the current `https://js.adsrvr.org/up_loader.3.0.0.js`. However, when a tag instance was created from an earlier version of the template (e.g. one that defaulted to `up_loader.1.1.0.js`), the saved value on that instance was retained when the template was upgraded — GTM only applies `defaultValue` to brand-new tag instances. Combined with the `inject_script` permission being pinned to `up_loader.3.0.0.js`, the SDK could silently fail to load for upgraded clients.

          The URL is now sourced directly from the sandboxed JS, alongside the `inject_script` permission. Publishing a new template version is now sufficient to migrate every existing tag instance to the new URL — no per-tag reconfiguration required.

          The `TTD Conversion Javascript SDK URL` field has been removed from the GTM tag UI. Any previously-saved value on existing tag instances is ignored.
